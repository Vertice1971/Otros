<!DOCTYPE html>

<head>

<title>Tiempos verbales</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fondo: #f7f5f0;
    --papel: #ffffff;
    --texto: #1e1e1e;
    --gris: #888;
    --acento: #5a6e3c;
    --acento-claro: #e8eddf;
    --error: #7a2e2e;
    --borde: #d0ccc3;
    --mono: 'Courier New', Courier, monospace;
    --sans: Georgia, 'Times New Roman', serif;
  }

  body {
    background: var(--fondo);
    color: var(--texto);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    max-width: 720px;
    margin: 0 auto 3rem;
    border-bottom: 2px solid var(--texto);
    padding-bottom: 1rem;
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: normal;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  header p {
    color: var(--gris);
    font-size: 0.9rem;
    margin-top: 0.3rem;
  }

  #contenedor {
    max-width: 720px;
    margin: 0 auto;
  }

  .bloque-tiempo {
    margin-bottom: 2.5rem;
    background: var(--papel);
    border: 1px solid var(--borde);
    padding: 1.5rem 1.75rem;
  }

  .etiqueta-tiempo {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gris);
    margin-bottom: 0.3rem;
  }

  .nombre-tiempo {
    font-size: 1.05rem;
    font-weight: bold;
    margin-bottom: 1.2rem;
    border-bottom: 1px solid var(--borde);
    padding-bottom: 0.6rem;
  }

  .ejercicio {
    margin-bottom: 1.2rem;
  }

  .enunciado {
    font-family: var(--mono);
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 0.4rem;
  }

  .forma-destacada {
    font-style: italic;
    font-weight: bold;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .btn-solución {
    font-family: var(--mono);
    font-size: 0.82rem;
    background: none;
    border: 1px solid var(--acento);
    color: var(--acento);
    padding: 0.2rem 0.7rem;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, color 0.15s;
  }

  .btn-solución:hover {
    background: var(--acento);
    color: #fff;
  }

  .solución {
    display: none;
    margin-top: 0.4rem;
    font-family: var(--mono);
    font-size: 0.88rem;
    color: var(--acento);
    border-left: 3px double var(--acento);
    padding-left: 0.7rem;
    line-height: 1.5;
  }

  .solución.visible {
    display: block;
  }

  .solución strong {
    text-decoration: underline double;
    text-underline-offset: 3px;
  }

  .controles {
    max-width: 720px;
    margin: 0 auto 2.5rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .btn-acción {
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 0.45rem 1.1rem;
    border: 1px solid var(--texto);
    background: var(--texto);
    color: var(--fondo);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
  }

  .btn-acción:hover { opacity: 0.8; }

  .btn-acción.secundario {
    background: none;
    color: var(--texto);
  }

  .divisor-grupo {
    max-width: 720px;
    margin: 0 auto 1.5rem;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gris);
    border-top: 1px solid var(--borde);
    padding-top: 0.5rem;
  }

  @media (max-width: 500px) {
    .bloque-tiempo { padding: 1rem 1rem; }
    .enunciado { font-size: 0.88rem; }
  }
</style>
</head>

/* ====================================================
   LÓGICA DE SESIÓN
==================================================== */
function elegirDos(arr) {
  const copia = [...arr];
  const resultado = [];
  for (let i = 0; i < 2 && copia.length > 0; i++) {
    const idx = Math.floor(Math.random() * copia.length);
    resultado.push(copia.splice(idx, 1)[0]);
  }
  return resultado;
}

function marcaForma(enunciado, forma) {
  const re = new RegExp('(' + forma.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'g');
  return enunciado.replace(re, '<span class="forma-destacada">$1</span>');
}

function construirSesion() {
  const contenedor = document.getElementById('contenedor');
  contenedor.innerHTML = '';
  let numEj = 1;

  grupos.forEach(grupo => {
    const div = document.createElement('div');
    div.className = 'divisor-grupo';
    div.textContent = grupo.label;
    contenedor.appendChild(div);

    grupo.tiempos.forEach(tiempo => {
      const ejercicios = elegirDos(banco[tiempo]);
      const bloque = document.createElement('div');
      bloque.className = 'bloque-tiempo';

      const partes = tiempo.split(' · ');
      const etiqueta = partes.length > 1 ? partes[0] : '';
      const nombre = partes.length > 1 ? partes[1] : partes[0];

      bloque.innerHTML = `
        ${etiqueta ? `<div class="etiqueta-tiempo">${etiqueta}</div>` : ''}
        <div class="nombre-tiempo">${nombre}</div>
      `;

      ejercicios.forEach(ej => {
        const divEj = document.createElement('div');
        divEj.className = 'ejercicio';
        const id = 'sol-' + (numEj++);

        divEj.innerHTML = `
          <div class="enunciado">${marcaForma(ej.enunciado, ej.forma)}</div>
          <button class="btn-solución" onclick="toggleSol('${id}', this)">▶ ver solución</button>
          <div class="solución" id="${id}"><strong>${ej.forma}</strong> — ${ej.solución}</div>
        `;
        bloque.appendChild(divEj);
      });

      contenedor.appendChild(bloque);
    });
  });
}

function toggleSol(id, btn) {
  const el = document.getElementById(id);
  if (el.classList.contains('visible')) {
    el.classList.remove('visible');
    btn.textContent = '▶ ver solución';
  } else {
    el.classList.add('visible');
    btn.textContent = '▼ ocultar';
  }
}

function mostrarTodo() {
  document.querySelectorAll('.solución').forEach(el => el.classList.add('visible'));
  document.querySelectorAll('.btn-solución').forEach(b => b.textContent = '▼ ocultar');
}

function ocultarTodo() {
  document.querySelectorAll('.solución').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('.btn-solución').forEach(b => b.textContent = '▶ ver solución');
}

function nuevaSesion() {
  ocultarTodo();
  construirSesion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Inicialización */
construirSesion();
